name: check

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  define-check-matrix:
    name: define-check-matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.matrix }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Build check matrix
        id: matrix
        shell: bash
        run: |
          matrix="$(python3 scripts/check_profile_manifest.py --github-matrix)"
          echo "matrix=${matrix}" >> "$GITHUB_OUTPUT"

  windows:
    needs: define-check-matrix
    name: ${{ matrix.job_name }}
    runs-on: windows-latest
    timeout-minutes: 20
    env:
      CARGO_TERM_COLOR: always
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.define-check-matrix.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        if: ${{ matrix.needs_python }}
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install Rust toolchain
        if: ${{ matrix.needs_rust }}
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal --component rustfmt --component clippy
          rustup default stable

      - name: Run check profile
        shell: pwsh
        run: .\scripts\check.ps1 -Profile ${{ matrix.profile }}
